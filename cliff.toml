# Configuration for git-cliff changelog generator
# https://git-cliff.org/docs/configuration

[changelog]
# Changelog header
header = """
# Changelog

All notable changes to this project will be documented in this file.

This project adheres to [Keep a Changelog](https://keepachangelog.com/en/1.0.0/)
and [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""

# Template for each version section
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.breaking %}⚠️ **BREAKING** {% endif %}{{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](.))\
        {% if commit.links %}
            {% for link in commit.links %}
                [{{ link.text }}]({{ link.href }})
            {% endfor %}
        {% endif %}
    {% endfor %}
{% endfor %}

"""

# Changelog footer
footer = """
---
*Generated by git-cliff*
"""

# Remove leading/trailing whitespace from templates
trim = true

[git]
# Parse conventional commits
conventional_commits = true

# Filter out merge commits
filter_unconventional = true

# Split commits by newlines
split_commits = false

# Commit type to changelog section mapping
commit_parsers = [
    { message = "^feat", group = "✨ Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^docs", group = "📝 Documentation" },
    { message = "^style", group = "🎨 Styles" },
    { message = "^refactor", group = "♻️ Code Refactoring" },
    { message = "^perf", group = "⚡ Performance Improvements" },
    { message = "^test", group = "✅ Tests" },
    { message = "^build", group = "📦 Build System" },
    { message = "^ci", group = "👷 CI/CD" },
    { message = "^chore", group = "🔧 Chores" },
    { message = "^revert", group = "⏪ Reverts" },
]

# Protect breaking changes
protect_breaking_commits = true

# Filter out commits that don't match any parser
filter_commits = true

# Sort tags
tag_pattern = "v[0-9]*"

# Sort commits
sort_commits = true

# Topological sort
topo_order = false
