name: DAST Security Scan

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2 AM
  workflow_dispatch:

jobs:
  dast-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build:hooks

      - name: Start application (if applicable)
        run: |
          echo "Starting application for DAST scan..."
          # Customize based on your app's startup command
          # npm start &
          # sleep 10
          echo "Note: Configure actual app startup in this step"
        continue-on-error: true

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: .zap/rules.tsv
          cmd_options: '-a -j'
        continue-on-error: true

      - name: Upload ZAP scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-scan-results
          path: |
            report_html.html
            report_json.json
          retention-days: 30

      - name: Publish ZAP scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: report_json.json
        continue-on-error: true
