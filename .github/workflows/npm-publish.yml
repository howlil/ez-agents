name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build hooks
        run: npm run build:hooks

      - name: Check if version changed
        id: version-check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PREV_VERSION=$(git tag -l "v$PKG_VERSION" || echo "")
          
          if [ -n "$PREV_VERSION" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version $PKG_VERSION already tagged - skipping publish"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New version: $PKG_VERSION"
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.changed == 'true'
        run: |
          echo "Publishing to npm..."
          npm publish --access public --provenance || {
            echo "::error::Failed to publish to npm. Check NPM_TOKEN secret."
            exit 1
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Git tag
        if: steps.version-check.outputs.changed == 'true'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$PKG_VERSION" -m "Release v$PKG_VERSION"
          git push origin "v$PKG_VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
