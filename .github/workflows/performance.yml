name: Performance & Load Testing

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 3 * * 1'  # Weekly on Monday at 3 AM
  workflow_dispatch:

jobs:
  load-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build:hooks

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Start application (if applicable)
        run: |
          echo "Starting application for load test..."
          # Customize based on your app's startup command
          # npm start &
          # sleep 10
          echo "Note: Configure actual app startup in this step"
        continue-on-error: true

      - name: Run k6 load test
        run: |
          k6 run tests/perf/load-test.js || echo "No load test configured yet"
        continue-on-error: true

      - name: Run k6 stress test
        run: |
          k6 run tests/perf/stress-test.js || echo "No stress test configured yet"
        continue-on-error: true

      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: |
            tests/perf/results/
            *.json
          retention-days: 30
