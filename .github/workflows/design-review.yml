name: Design Review Gate

on:
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  design-review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Check for design documents
        id: design-check
        run: |
          echo "Checking for design documentation..."
          
          DESIGN_FILES=()
          
          # Check for architecture decision records
          if ls docs/adr/*.md 1> /dev/null 2>&1; then
            DESIGN_FILES+=("docs/adr/*.md")
            echo "✓ Found Architecture Decision Records"
          fi
          
          # Check for design docs in PR
          if git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} | grep -qiE '(design|arch|spec)'; then
            echo "✓ PR contains design-related changes"
          fi
          
          # Check for API specifications
          if ls *.yaml *.yml *.openapi* 1> /dev/null 2>&1 || find . -name "*.openapi*" -o -name "swagger*" -o -name "api-spec*" | grep -q .; then
            echo "✓ Found API specifications"
          fi
          
          echo "design_files_count=${#DESIGN_FILES[@]}" >> $GITHUB_OUTPUT

      - name: Require design review for major changes
        if: github.event.pull_request
        run: |
          echo "Design Review Gate"
          echo "=================="
          echo ""
          echo "This PR requires design review if it:"
          echo "  - Modifies core architecture"
          echo "  - Adds new public APIs"
          echo "  - Changes database schema"
          echo "  - Introduces new external dependencies"
          echo "  - Modifies authentication/authorization"
          echo ""
          echo "Review checklist:"
          echo "  □ Architecture alignment verified"
          echo "  □ API contracts documented"
          echo "  □ Security implications considered"
          echo "  □ Performance impact assessed"
          echo "  □ Backward compatibility maintained"
          echo ""
          
          # Comment on PR with review reminder
          cat << 'EOF' > design-review-reminder.md
          ## 🎨 Design Review Required
          
          This PR may contain architectural or design changes. Please ensure:
          
          - [ ] Architecture Decision Record (ADR) created/updated if needed
          - [ ] API documentation updated
          - [ ] Security review completed
          - [ ] Performance considerations documented
          - [ ] Backward compatibility verified
          
          @${{ github.actor }} Please tag a maintainer for design review.
          EOF

      - name: Validate API spec changes
        run: |
          echo "Validating API specification changes..."
          # Add OpenAPI/Swagger validation here if specs exist
          echo "Note: Add OpenAPI validation when API specs are added to project"

      - name: Post review reminder
        uses: actions/github-script@v7
        if: github.event.pull_request
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🎨 Design Review Checklist
              
              This PR may require design review. Reviewers should verify:
              
              - [ ] Architecture changes are documented in ADRs
              - [ ] API contracts are documented (OpenAPI/Swagger)
              - [ ] Security implications are considered
              - [ ] Performance impact is assessed
              - [ ] Backward compatibility is maintained
              
              <details>
              <summary>Review Guidelines</summary>
              
              ### When Design Review is Required:
              - Core architecture modifications
              - New public API endpoints
              - Database schema changes
              - New external service integrations
              - Authentication/authorization changes
              - Breaking changes to existing interfaces
              
              </details>`
            })
